name: Pull changed translations from Lokalise

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull from Lokalise
        uses: lokalise/lokalise-pull-action@v4.0.0
        with:
          api_token: 1f7d91b487831c7264c6643be0cb8d40162efea7
          project_id: 3939761469d33783c0acc1.91645315
          base_lang: en
          translations_path: |
            src/locales
          file_format: json
          file_ext: json
          flat_naming: true
          always_pull_base: true

          pr_title: "Translations from Lokalise"
          pr_body: "New translations"
          git_commit_message: "updates to lokalise-hub"
          pr_labels: lokalise

          skip_include_tags: true
          additional_params: >
            {
              "filter_data": ["reviewed"]
            }